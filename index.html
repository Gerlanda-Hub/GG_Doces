    <style>
      /* Elegant loading splash that shows before React mounts */
      #app-splash {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(160deg, #e8456b 0%, #ed6c8d 100%);
        transition: opacity 0.5s ease;
      }
      #app-splash.hide { opacity: 0; pointer-events: none; }
      #app-splash .splash-badge {
        width: 110px;
        height: 110px;
        border-radius: 32px;
        background: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 60px;
        box-shadow: 0 12px 40px rgba(0,0,0,0.25);
        animation: splashFloat 2s ease-in-out infinite;
      }
      #app-splash .splash-title {
        margin-top: 24px;
        color: #fff;
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.5px;
      }
      #app-splash .splash-sub {
        margin-top: 6px;
        color: rgba(255,255,255,0.85);
        font-family: 'Segoe UI', system-ui, sans-serif;
        font-size: 12px;
      }
      #app-splash .splash-spinner {
        margin-top: 28px;
        width: 32px;
        height: 32px;
        border: 3px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: splashSpin 0.8s linear infinite;
      }
      @keyframes splashFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-12px); }
      }
      @keyframes splashSpin { to { transform: rotate(360deg); } }
    </style>
